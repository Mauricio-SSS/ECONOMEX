backend:
  name: github
  repo: Mauricio-SSS/ECONOMEX
  branch: main
  base_url: https://centro-economex-decap-oauth.mauriciosalinas.workers.dev
  auth_endpoint: auth

#publish_mode: editorial_workflow

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articulos"
    label: "Artículos"
    folder: "content/articulos"
    create: true
    delete: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    identifier_field: "title"

    fields:
      - label: "Template"
        name: "template"
        widget: "select"
        options:
          - { label: "Artículo normal con visuales", value: "articulo-visual" }
          - { label: "Investigación traducida", value: "investigacion-traducida" }
          - { label: "Especial interactivo", value: "especial-interactivo" }
          - { label: "Policy brief", value: "policy-brief" }

      - { label: "Título", name: "title", widget: "string" }

      - label: "Tema en una oración"
        name: "oneSentence"
        widget: "text"

      - { label: "Autor", name: "author", widget: "string" }

      - label: "Foto del autor"
        name: "authorImage"
        widget: "image"
        required: false
        hint: "Opcional. Si se deja vacío, se usará la imagen de perfil predeterminada."

      - label: "Fecha"
        name: "date"
        widget: "datetime"

      - label: "Tiempo de lectura"
        name: "readTime"
        widget: "string"
        required: false
        hint: "Ejemplo: 12 min de lectura"

      - label: "Resumen / abstract"
        name: "abstract"
        widget: "text"

      - label: "Puntos del resumen ejecutivo"
        name: "summaryPoints"
        widget: "list"
        required: false
        field: { label: "Punto", name: "point", widget: "string" }

      - label: "Imagen principal"
        name: "heroImage"
        widget: "image"
        required: false

      - label: "Mostrar visual storytelling"
        name: "showVisualStorytelling"
        widget: "boolean"
        required: false
        default: true
        hint: "Activa o desactiva el resumen visual y la narrativa visual lateral del artículo."

      - label: "Elemento visual principal"
        name: "mainVisual"
        widget: "object"
        required: false
        fields:
          - label: "Tipo"
            name: "type"
            widget: "select"
            options:
              - { label: "Sin visual", value: "none" }
              - { label: "Mapa", value: "map" }
              - { label: "Gráfica de línea", value: "line-chart" }
              - { label: "Gráfica de barras", value: "bar-chart" }
              - { label: "Scrollytelling", value: "scrolly-chart" }

          - { label: "Título del visual", name: "title", widget: "string", required: false }
          - { label: "Dataset", name: "dataset", widget: "string", required: false }
          - { label: "Variable", name: "variable", widget: "string", required: false }
          - { label: "Año", name: "year", widget: "number", required: false }

      - label: "Resumen visual lateral"
        name: "visualSummary"
        widget: "object"
        required: false
        fields:
          - { label: "Título", name: "title", widget: "string", required: false }
          - { label: "Descripción / caption", name: "caption", widget: "text", required: false }
          - { label: "Etiqueta baja", name: "lowLabel", widget: "string", required: false, default: "Bajo" }
          - { label: "Etiqueta alta", name: "highLabel", widget: "string", required: false, default: "Alto" }
          - { label: "Indicador 1: valor", name: "statOneValue", widget: "string", required: false }
          - { label: "Indicador 1: etiqueta", name: "statOneLabel", widget: "string", required: false }
          - { label: "Indicador 2: valor", name: "statTwoValue", widget: "string", required: false }
          - { label: "Indicador 2: etiqueta", name: "statTwoLabel", widget: "string", required: false }
          - { label: "Indicador 3: valor", name: "statThreeValue", widget: "string", required: false }
          - { label: "Indicador 3: etiqueta", name: "statThreeLabel", widget: "string", required: false }

      - label: "Narrativa visual lateral"
        name: "narrativeVisual"
        widget: "object"
        required: false
        fields:
          - { label: "Título", name: "title", widget: "string", required: false }
          - { label: "Descripción", name: "description", widget: "text", required: false }
          - label: "Pasos"
            name: "steps"
            widget: "list"
            required: false
            field: { label: "Paso", name: "step", widget: "string" }

      - label: "Artículo normal apoyado de visuales"
        name: "body"
        widget: "markdown"

      - label: "Fuentes"
        name: "sources"
        widget: "list"
        required: false
        fields:
          - { label: "Nombre", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

  - name: "autores"
    label: "Autores"
    folder: "content/autores"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Foto", name: "photo", widget: "image", required: false }

  - name: "temas"
    label: "Temas"
    folder: "content/temas"
    create: true
    delete: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    identifier_field: "name"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
